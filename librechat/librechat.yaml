version: 1.2.1

interface:
  # Artifacts render agent-generated React/HTML in a side panel.
  artifacts: true

endpoints:
  custom:
    - name: OpenRouter
      apiKey: "${OPENROUTER_KEY}"
      baseURL: https://openrouter.ai/api/v1
      models:
        default: ["anthropic/claude-sonnet-5"]
        fetch: true
      titleConvo: true
      titleModel: "anthropic/claude-haiku-4.5"

mcpSettings:
  allowedAddresses:
    - "host.docker.internal:8001"

mcpServers:
  clickhouse:
    type: streamable-http
    url: http://host.docker.internal:8001/mcp
    timeout: 60000
